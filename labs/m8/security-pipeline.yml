# Example GitHub Actions pipeline: build -> SBOM -> scan -> sign -> push.
# Copy into .github/workflows/ in your app repo. Uses keyless cosign (OIDC) so no
# private key is stored — the workflow's identity signs via Sigstore/Fulcio.
name: Build, Scan & Sign

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write        # required for cosign keyless (OIDC) signing

jobs:
  supply-chain:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/${{ github.repository }}/acme-support-agent
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: ./labs/m6
          push: true
          tags: ${{ env.IMAGE }}:${{ github.sha }}

      - name: SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.IMAGE }}:${{ github.sha }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Scan (Trivy) — fail on CRITICAL/HIGH
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE }}:${{ github.sha }}
          severity: CRITICAL,HIGH
          exit-code: '1'          # gate the pipeline on unfixed critical/high vulns

      - name: Sign (Cosign keyless)
        uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes ${{ env.IMAGE }}@${{ steps.build.outputs.digest }}
