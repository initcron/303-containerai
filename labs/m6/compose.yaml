# M6 · Declarative Agent — the growing compose.yaml gains the agent + its vector memory.
# Model stays NATIVE (Ollama). ChromaDB holds the agent's knowledge. MCP tools run
# separately via ToolHive (thv) — see the lab; they're not a compose service here because
# ToolHive manages their lifecycle + isolation.
#
# Prereqs: ollama pull qwen2.5:1.5b && ollama pull nomic-embed-text
services:
  chromadb:
    image: chromadb/chroma:0.5.20
    container_name: chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped

  # The declarative agent. One-shot: `docker compose run --rm agent "your question"`.
  agent:
    build:
      context: .
      dockerfile: Dockerfile
    image: acme-support-agent:latest
    depends_on:
      - chromadb
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - LLM_MODEL=qwen2.5:1.5b
      - EMBEDDING_MODEL=nomic-embed-text

volumes:
  chroma_data:
